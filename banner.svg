<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Optical Heart Rate Monitor Banner</title>
  <desc id="desc">Decorative banner for the Optical Heart Rate Monitor project README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B132B"/>
      <stop offset="0.5" stop-color="#102A43"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="pulse" x1="140" y1="180" x2="1050" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.6" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="28" fill="url(#grid)"/>

  <circle cx="1030" cy="78" r="58" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
  <circle cx="1030" cy="78" r="33" fill="rgba(34,211,238,0.18)" stroke="#7DD3FC" stroke-width="2"/>
  <path d="M1010 78 h10 l8 -18 l10 36 l8 -18 h12" stroke="#FDE68A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g opacity="0.16">
    <path d="M0 250 C160 220 220 270 360 240 C520 205 660 280 820 235 C970 195 1090 255 1200 220 V320 H0 Z" fill="#FFFFFF"/>
  </g>

  <path d="M140 180 
           H250 
           L280 180 
           L300 150 
           L320 220 
           L350 120 
           L385 210 
           L420 180 
           H560
           L590 180 
           L610 160 
           L630 205 
           L655 145 
           L680 190 
           L715 180 
           H840
           L865 180 
           L885 165 
           L905 200 
           L930 140 
           L955 188 
           L985 180 
           H1050" 
        stroke="url(#pulse)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <circle cx="140" cy="180" r="7" fill="#22D3EE"/>
  <circle cx="1050" cy="180" r="7" fill="#FDE68A"/>

  <text x="90" y="102" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700">Optical Heart Rate Monitor</text>
  <text x="92" y="142" fill="#CFFAFE" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500">Analog signal conditioning • optical pulse sensing • threshold-based alerting</text>

  <g transform="translate(92 210)">
    <rect x="0" y="0" width="158" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.16)"/>
    <text x="79" y="22" text-anchor="middle" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600">Low-Voltage Prototype</text>

    <rect x="172" y="0" width="168" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.16)"/>
    <text x="256" y="22" text-anchor="middle" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600">Biomedical Instrumentation</text>

    <rect x="354" y="0" width="172" height="34" rx="17" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.16)"/>
    <text x="440" y="22" text-anchor="middle" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600">Signal Path Validation</text>
  </g>
</svg>